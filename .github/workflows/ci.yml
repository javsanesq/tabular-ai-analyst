name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ./api[dev]
      - name: Backend tests
        env:
          PYTHONPATH: "api/src"
          APP_ENV: "test"
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          DATA_DIR: "data/test"
        run: pytest -q
      - name: Backend lint
        run: ruff check api/src tests
      - name: Benchmark smoke
        env:
          PYTHONPATH: "api/src"
          APP_ENV: "test"
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          DATA_DIR: "data/benchmark"
        run: python scripts/run_benchmark.py
      - name: OpenAI planner smoke
        env:
          PYTHONPATH: "api/src"
          DATA_DIR: "data/openai-smoke"
        run: python scripts/smoke_openai_planner.py
      - name: Frontend build
        run: |
          cd ui
          npm ci
          npm run typecheck
          npm run build
      - name: Frontend E2E
        run: |
          cd ui
          npx playwright install --with-deps chromium
          npm run test:e2e
      - name: Deployment config
        run: |
          bash -n scripts/smoke_docker.sh
          docker compose config >/tmp/tabular-compose.yml
      - name: Docker image builds
        run: |
          docker build -f api/Dockerfile -t tabular-ai-analyst-api:ci .
          docker build -f ui/Dockerfile -t tabular-ai-analyst-ui:ci .
