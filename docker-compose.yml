services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tabular_analyst
      POSTGRES_USER: tabular
      POSTGRES_PASSWORD: tabular
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tabular -d tabular_analyst"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - appdata:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 12

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:80"

volumes:
  pgdata:
  appdata:
