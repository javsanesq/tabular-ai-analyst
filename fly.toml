app = "tabular-ai-analyst"
primary_region = "mad"

[build]
  dockerfile = "api/Dockerfile"

[env]
  APP_ENV = "production"
  DATA_DIR = "/app/data"
  LLM_PROVIDER = "openai"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health/ready"

[[mounts]]
  source = "tabular_data"
  destination = "/app/data"

